name: Build APK

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Analyze Project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Find APK location
        run: find /home/runner/work -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: List build output
        run: ls -la build/app/outputs/ 2>/dev/null || echo "Output dir not found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fileziaroh-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        run: flutter build apk --release --split-per-abi

      - name: Upload Release APKs
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: fileziaroh-release-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "File Ziaroh v1.0.${{ github.run_number }}"
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}