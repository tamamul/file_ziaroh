name: Build Flutter APK (Clean CI)

on:
push:
branches:
- main
- develop

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  # Flutter stabil terbaru (hindari mismatch Kotlin/AGP)
  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: 'stable'
      cache: true

  - name: Clean Project
    run: flutter clean

  - name: Get Dependencies
    run: flutter pub get

  - name: Analyze (non-blocking)
    run: flutter analyze --no-fatal-infos --no-fatal-warnings
    continue-on-error: true

  # DEBUG BUILD
  - name: Build Debug APK
    run: flutter build apk --debug --verbose

  - name: Upload Debug APK
    uses: actions/upload-artifact@v4
    with:
      name: fileziaroh-debug-${{ github.run_number }}
      path: build/app/outputs/flutter-apk/app-debug.apk

  # RELEASE BUILD (main only)
  - name: Build Release APK
    if: github.ref == 'refs/heads/main'
    run: flutter build apk --release

  - name: Upload Release APK
    if: github.ref == 'refs/heads/main'
    uses: actions/upload-artifact@v4
    with:
      name: fileziaroh-release-${{ github.run_number }}
      path: build/app/outputs/flutter-apk/app-release.apk

  # Optional: GitHub Release
  - name: Create GitHub Release
    if: github.ref == 'refs/heads/main'
    uses: softprops/action-gh-release@v2
    with:
      tag_name: build-${{ github.run_number }}
      name: "File Ziaroh Build ${{ github.run_number }}"
      files: build/app/outputs/flutter-apk/app-release.apk
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}